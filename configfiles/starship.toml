"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 2000

format = """[ ](bg:#6272a4)\
$os\
${env_var.STARSHIP_SHELL}\
[](bg:#44475a fg:#6272a4)\
$username\
[](bg:#6272a4 fg:#44475a)\
$hostname\
[](bg:#0087AF fg:#6272a4)\
$directory\
[](fg:#0087AF) \
$fill\
${custom.git_clean}\
${custom.git_dirty}\
${custom.git_conflict}\
$cmd_duration\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$python\
$rust\
$scala\
$docker_context\
$time
$character"""

add_newline = false

[character]
success_symbol = "[❯](fg:#50fa7b)"
error_symbol = "[❯](fg:#ff5555)"

[env_var.STARSHIP_SHELL]
style = "fg:#f8f8f2 bg:#6272a4"
format = '[$env_value ]($style)'

[username]
show_always = true
style_user = "fg:#f8f8f2 bg:#44475a"
style_root = "fg:#ff5555 bg:#44475a"
format = '[ $user ]($style)'
disabled = false

[os]
style = "bg:#44475a"
disabled = true

[fill]
symbol = " "

[hostname]
ssh_only = false
style = "fg:#f8f8f2 bg:#6272a4"
format = '[$ssh_symbol]($style)[ $hostname ]($style)'

[directory]
style = "fg:#303030 bg:#0087AF"
read_only = ''
read_only_style = "fg:#AF0000 bg:#0087AF"
format = '[ $path ]($style)[$read_only]($read_only_style)'
truncation_length = 10
fish_style_pwd_dir_length = 1

[cmd_duration]
min_time = 2000
style = "fg:#f8f8f2 bg:#44475a"
format = '[  $duration ]($style)'

[c]
symbol = "\ue61e "
style = "fg:#f8f8f2 bg:#44475a"
format = '[ $symbol($version) ]($style)'

[golang]
symbol = "\ue627 "
style = "fg:#f8f8f2 bg:#44475a"
format = '[ $symbol($version) ]($style)'

[java]
symbol = "\ue738 "
style = "fg:#f8f8f2 bg:#44475a"
format = '[ $symbol($version) ]($style)'

[gradle]
style = "fg:#f8f8f2 bg:#44475a"
format = '[ $symbol($version) ]($style)'

[nodejs]
symbol = "\ue718 "
style = "fg:#f8f8f2 bg:#44475a"
format = '[ $symbol($version) ]($style)'

[python]
symbol = "\ue73c "
style = "fg:#f8f8f2 bg:#44475a"
format = '[ $symbol($version) ]($style)'

[rust]
symbol = "\ue7a8 "
style = "fg:#f8f8f2 bg:#44475a"
format = '[ $symbol($version) ]($style)'

[elixir]
symbol = "\ue62d "
style = "fg:#f8f8f2 bg:#44475a"
format = '[ $symbol($version) ]($style)'

[elm]
symbol = "\ue62c "
style = "fg:#f8f8f2 bg:#44475a"
format = '[ $symbol($version) ]($style)'

[haskell]
symbol = "\ue61f "
style = "fg:#f8f8f2 bg:#44475a"
format = '[ $symbol($version) ]($style)'

[julia]
symbol = "\ue624 "
style = "fg:#f8f8f2 bg:#44475a"
format = '[ $symbol($version) ]($style)'

[nim]
symbol = "\uf6a4 "
style = "fg:#f8f8f2 bg:#44475a"
format = '[ $symbol($version) ]($style)'

[scala]
symbol = "\ue737 "
style = "fg:#f8f8f2 bg:#44475a"
format = '[ $symbol($version) ]($style)'

[docker_context]
symbol = "\uf308 "
style = "fg:#f8f8f2 bg:#44475a"
format = '[ $symbol$context ]($style)'

[time]
disabled = false
time_format = "%Y-%m-%d %T"
style = "fg:#f8f8f2 bg:#44475a"
format = '[ $time ]($style)'

[git_branch]
disabled = true

[git_status]
disabled = true

[custom.git_clean]
description = "Git branch (clean)"
when = "git diff --quiet HEAD -- 2>/dev/null && test -z \"$(git ls-files --others --exclude-standard 2>/dev/null | head -1)\""
command = "git branch --show-current 2>/dev/null || git rev-parse --short HEAD 2>/dev/null"
style = "fg:#282a36 bg:#50fa7b"
format = '[](fg:#50fa7b)[  $output ]($style)'
shell = ["bash", "--noprofile", "--norc"]

[custom.git_dirty]
description = "Git branch (dirty)"
when = "! git diff --quiet HEAD -- 2>/dev/null || test -n \"$(git ls-files --others --exclude-standard 2>/dev/null | head -1)\""
command = "git branch --show-current 2>/dev/null || git rev-parse --short HEAD 2>/dev/null"
style = "fg:#282a36 bg:#ffb86c"
format = '[](fg:#ffb86c)[  $output ✱ ]($style)'
shell = ["bash", "--noprofile", "--norc"]

[custom.git_conflict]
description = "Git branch (conflict)"
when = "git ls-files --unmerged 2>/dev/null | head -1 | grep -q ."
command = "git branch --show-current 2>/dev/null || git rev-parse --short HEAD 2>/dev/null"
style = "fg:#f8f8f2 bg:#ff5555"
format = '[](fg:#ff5555)[  $output ≠ ]($style)'
shell = ["bash", "--noprofile", "--norc"]
